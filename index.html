                  <div style="font-size:11px;font-weight:500;color:#222">${esc(sub.name)}</div>
                </div>
              </div>
              <div style="padding:7px 10px;border-right:0.5px solid #e8eaed;font-size:9px;color:#555">${esc(sub.std)}</div>
              <div style="padding:7px 10px;border-right:0.5px solid #e8eaed">${rb(br)}</div>
              <div style="padding:7px 10px;border-right:0.5px solid #e8eaed">${ycell(sub.p24)}</div>
              <div style="padding:7px 10px;border-right:0.5px solid #e8eaed">${ycell(sub.p25)}</div>
              <div style="padding:7px 10px">${ycell(sub.p26)}</div>
            </div>`;
          });
          if(!fsubs.length) html+=`<div style="padding:8px 44px;font-size:11px;color:#aaa;font-style:italic">No subtests match search</div>`;
          html+=`</div>`;
        }
      });
    }
    html+=`</div>`;
  });
  wrap.innerHTML=`<div style="border:0.5px solid #e0e0e0;border-top:none;padding:6px 0 0">${html}</div>`;
}

// ── MONITORING TAB ────────────────────────────────────────────────────────────
function renderMonitoring(){
  const wrap=document.getElementById("board-wrap"); if(!wrap) return;
  if(!GROUPS.length){
    wrap.innerHTML=`<div style="text-align:center;padding:48px;color:#aaa"><div style="font-size:32px">📅</div><div style="margin-top:8px;font-size:12px">Sync data first to see the monitoring schedule.</div></div>`;
    return;
  }

  // Group all items by parentSku
  const allItems=[];
  GROUPS.forEach(g=>g.items.forEach(i=>allItems.push({g,i})));
  const byParent={};
  allItems.forEach(({g,i})=>{
    const key=i.parentSku||i.rowId;
    if(!byParent[key]) byParent[key]=[];
    byParent[key].push({g,i});
  });

  // Build all monitoring rows
  let allRows=[];
  Object.values(byParent).forEach(siblings=>{
    const donorEntry=siblings.find(({i})=>i.subs.some(s=>s.p24.length||s.p25.length||s.p26.length));
    if(!donorEntry) return;
    const {g,i:donor}=donorEntry;
    const subsWith2024=donor.subs.filter(s=>
      (s.p24&&s.p24.length>0)||(s.p25&&s.p25.length>0)||(s.p26&&s.p26.length>0)
    );
    const subStatuses=subsWith2024.map(s=>({
      sub:s,decision:getRetestDecision(donor.id,s.id),
      last:latestTestDate(s),exp:calcExpiry(s,donor.id),ms:monStatus(s,donor.id)
    }));
    let ms="none",exp=null,last=null;
    if(subStatuses.length>0){
      const dueOnes=subStatuses.filter(s=>s.decision!=="next");
      const allDeferred=dueOnes.length===0;
      if(allDeferred){
        ms="deferred";
        const sorted=[...subStatuses].sort((a,b)=>(a.exp?.getTime()||0)-(b.exp?.getTime()||0));
        exp=sorted[0]?.exp||null; last=sorted[0]?.last||null;
      } else {
        const order={overdue:0,due_soon:1,ok:2};
        const sorted=[...dueOnes].sort((a,b)=>(order[a.ms]??3)-(order[b.ms]??3));
        ms=sorted[0]?.ms||"none"; exp=sorted[0]?.exp||null; last=sorted[0]?.last||null;
      }
    }
    const siblingNames=siblings.filter(({i})=>i.id!==donor.id).map(({i})=>i.name);
    const parentKey=donor.parentSku||donor.rowId;
    allRows.push({g,donor,ms,exp,last,siblingNames,allSubs:donor.subs,subsWith2024,parentKey});
  });

  // Apply filters
  let rows=[...allRows];
  if(monFocusParent) rows=rows.filter(r=>r.parentKey===monFocusParent);
  if(monSearchQ){
    const q=monSearchQ.toLowerCase();
    rows=rows.filter(r=>
      r.donor.name.toLowerCase().includes(q)||
      r.siblingNames.some(n=>n.toLowerCase().includes(q))||
      r.allSubs.some(s=>s.name.toLowerCase().includes(q))
    );
  }
  if(monFilterStatus!=="ALL"){
    rows=rows.filter(r=>{
      if(monFilterStatus==="deferred") return r.subsWith2024.every(s=>getRetestDecision(r.donor.id,s.id)==="next");
      return r.subsWith2024.some(s=>monStatus(s,r.donor.id)===monFilterStatus);
    });
  }
  if(monFilterDecision!=="ALL"){
    rows=rows.filter(r=>r.subsWith2024.some(s=>getRetestDecision(r.donor.id,s.id)===monFilterDecision));
  }
  if(monFilterPriority!=="ALL"){
    rows=rows.filter(r=>(r.donor.prioritySku||"").trim().toLowerCase()===monFilterPriority.toLowerCase());
  }

  // Count per-subtest for stat cards
  let cntOverdue=0,cntSoon=0,cntOk=0,cntDeferred=0;
  rows.forEach(({donor,subsWith2024})=>{
    subsWith2024.forEach(s=>{
      const sm=monStatus(s,donor.id);
      if(sm==="overdue") cntOverdue++;
      else if(sm==="due_soon") cntSoon++;
      else if(sm==="ok") cntOk++;
      else if(sm==="deferred") cntDeferred++;
    });
  });

  const cg="minmax(180px,1.5fr) minmax(200px,2fr) minmax(300px,2fr) 190px";
  const hdrs=["Product / SKUs","Annual Test Requirements","Schedule per Test","Management Decision"];

  let h=`<div style="padding:14px 18px">`;

  // Search + filter bar
  const clearFocusBtn=monFocusParent?`<button onclick="clearMonFocus()" style="display:inline-flex;align-items:center;gap:4px;background:#e8f2ff;color:#0055bb;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;border:1px solid #c0d8f8;cursor:pointer">${esc(monFocusParent)} ✕</button>`:""
  const sBtn=(val,lbl,c)=>`<button onclick="monFilterStatus='${val}';renderMonitoring()" style="font-size:11px;font-weight:600;padding:3px 12px;border-radius:20px;cursor:pointer;border:1px solid ${monFilterStatus===val?"#0073ea":"#dde0e7"};background:${monFilterStatus===val?"#e8f2ff":"#fff"};color:${monFilterStatus===val?"#0055bb":c}">${lbl}</button>`;
  const dBtn=(val,lbl)=>`<button onclick="monFilterDecision='${val}';renderMonitoring()" style="font-size:11px;font-weight:600;padding:3px 12px;border-radius:20px;cursor:pointer;border:1px solid ${monFilterDecision===val?"#0073ea":"#dde0e7"};background:${monFilterDecision===val?"#e8f2ff":"#fff"};color:${monFilterDecision===val?"#0055bb":"#555"}">${lbl}</button>`;
  const pBtn=(val,lbl,c)=>`<button onclick="monFilterPriority='${val}';renderMonitoring()" style="font-size:11px;font-weight:600;padding:3px 12px;border-radius:20px;cursor:pointer;border:1px solid ${monFilterPriority===val?"#0073ea":"#dde0e7"};background:${monFilterPriority===val?"#e8f2ff":"#fff"};color:${monFilterPriority===val?"#0055bb":c}">${lbl}</button>`;

  h+=`<div style="background:#fff;border:1.5px solid #e0e3ea;border-radius:10px;padding:10px 14px;margin-bottom:14px">
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px">
      <div style="position:relative;flex:1;min-width:180px;max-width:300px">
        <svg style="position:absolute;left:9px;top:50%;transform:translateY(-50%);color:#aaa" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input value="${esc(monSearchQ)}" oninput="monSearchQ=this.value;renderMonitoring()" placeholder="Search SKU or test name…" style="width:100%;padding:6px 10px 6px 28px;border:1.5px solid #dde0e7;border-radius:7px;font-size:12px;background:#fafbfc;color:#333;outline:none;height:32px" autocomplete="off"/>
      </div>
      ${clearFocusBtn}
      ${(monSearchQ||monFilterStatus!=="ALL"||monFilterDecision!=="ALL"||monFocusParent||monFilterPriority!=="ALL")?`<button onclick="clearMonFilters()" style="font-size:11px;color:#e2445c;background:none;border:none;cursor:pointer;font-weight:500">✕ Clear all</button>`:""}
      <button onclick="exportMonitoringExcel()" style="margin-left:auto;display:inline-flex;align-items:center;gap:5px;padding:5px 14px;font-size:11px;font-weight:600;color:#0a7a46;background:#f0fff8;border:1.5px solid #c3f0da;border-radius:7px;cursor:pointer">📊 Export Excel</button>
    </div>
    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:6px">
      <span style="font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.4px">Priority:</span>
      ${pBtn("ALL","All","#555")}
      ${pBtn("Retail","★ Retail","#0a7a46")}
      ${pBtn("A","A SKU","#0055bb")}
      ${pBtn("B","B SKU","#b07000")}
      ${pBtn("C","C SKU","#7c3aed")}
    </div>
    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
      <span style="font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.4px">Status:</span>
      ${sBtn("ALL","All","#555")}
      ${sBtn("overdue","🔴 Retest Due","#c0392b")}
      ${sBtn("due_soon","🟡 Due Soon","#b07000")}
      ${sBtn("ok","🟢 On Track","#0a7a46")}
      ${sBtn("deferred","🔵 Deferred","#0055bb")}
      <span style="font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.4px;margin-left:8px">Decision:</span>
      ${dBtn("ALL","All")}
      ${dBtn("now","✓ Retest Now")}
      ${dBtn("next","🔵 Deferred")}
    </div>
  </div>`;

  // Alert banner
  if(cntOverdue||cntSoon){
    h+=`<div style="background:#fff8f8;border:1.5px solid #ffc0c0;border-radius:10px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:flex-start;gap:10px">
      <span style="font-size:20px;flex-shrink:0">🔴</span>
      <div><div style="font-size:13px;font-weight:700;color:#c0392b;margin-bottom:3px">Action Required</div>
      <div style="font-size:11px;color:#555;line-height:1.6">${cntOverdue?`<strong>${cntOverdue} test${cntOverdue>1?"s":""} overdue</strong> — retesting is past due. `:""
      }${cntSoon?`<strong>${cntSoon} test${cntSoon>1?"s":""} due within 6 months</strong> — schedule now.`:""}</div>
      </div></div>`;
  }

  // Stat cards — clickable to filter
  h+=`<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px">
    ${[{l:"Retest Due",n:cntOverdue,bg:"#fff0f0",c:"#c0392b",br:"#ffd0d0",f:"overdue"},
       {l:"Due Soon <6mo",n:cntSoon,bg:"#fffdf0",c:"#b07000",br:"#fde8c0",f:"due_soon"},
       {l:"On Track >6mo",n:cntOk,bg:"#f0fff8",c:"#0a7a46",br:"#c3f0da",f:"ok"},
       {l:"Deferred",n:cntDeferred,bg:"#f0f6ff",c:"#0055bb",br:"#c0d8f8",f:"deferred"}]
    .map(s=>`<div style="background:${s.bg};border:1.5px solid ${s.br};border-radius:8px;padding:10px 16px;flex:1;min-width:80px;text-align:center">
      <div style="font-size:24px;font-weight:700;color:${s.c}">${s.n}</div>
      <div style="font-size:10px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px">${s.l}</div>
    </div>`).join("")}
  </div>`;

  if(rows.length===0){
    h+=`<div style="text-align:center;padding:48px;color:#aaa"><div style="font-size:32px">🔍</div><div style="font-size:12px;margin-top:8px">No items match the current filters.</div></div>`;
  } else {
    h+=`<div style="border:1.5px solid #e0e0e0;border-radius:10px;overflow:hidden">
      <div style="display:grid;grid-template-columns:${cg};background:#f2f3f6;border-bottom:1.5px solid #dde0e9">
        ${hdrs.map(hd=>`<div style="padding:8px 12px;font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;border-right:0.5px solid #dde0e9">${hd}</div>`).join("")}
      </div>`;

    rows.forEach(({g,donor,siblingNames,allSubs,subsWith2024})=>{
      const bgRow="#fff";

      // Product cell
      const productCell=`<div style="padding:10px 12px;border-right:0.5px solid #e8eaed">
        <div style="display:flex;align-items:flex-start;gap:6px">
          <div style="width:4px;border-radius:2px;background:${g.color};flex-shrink:0;min-height:16px;margin-top:2px"></div>
          <div>
            <div style="font-size:11px;font-weight:700;color:#222">${esc(donor.name)}</div>
            ${siblingNames.map(n=>`<div style="font-size:10px;color:#bbb;margin-top:2px">${esc(n)}</div>`).join("")}
          </div>
        </div>
      </div>`;

      // Annual Test Requirements cell
      const subRows=allSubs.map(s=>{
        const sbr=bestResult(s);
        const dotColor=sbr==="PASS"?"#00c875":sbr==="FAIL"?"#e2445c":"#ccc";
        const hasAnnual=(s.p24&&s.p24.length>0)||(s.p25&&s.p25.length>0)||(s.p26&&s.p26.length>0);
        return `<div style="display:flex;align-items:center;gap:5px;margin-bottom:4px">
          <div style="width:7px;height:7px;border-radius:50%;background:${dotColor};flex-shrink:0"></div>
          <span style="font-size:10px;color:#333;flex:1">${esc(s.name)}</span>
          ${hasAnnual?`<span style="font-size:8px;font-weight:700;color:#0073ea;background:#e8f2ff;padding:1px 5px;border-radius:10px;flex-shrink:0">Annual</span>`:""}
        </div>`;
      }).join("");
      const testCell=`<div style="padding:10px 12px;border-right:0.5px solid #e8eaed">${subRows||`<span style="font-size:10px;color:#bbb">—</span>`}</div>`;

      // Per-subtest schedule
      const scheduleCell=`<div style="padding:10px 12px;border-right:0.5px solid #e8eaed">
        ${subsWith2024.length===0?`<span style="color:#bbb;font-size:10px">—</span>`:subsWith2024.map(s=>{
          const dec=getRetestDecision(donor.id,s.id);
          const sExp=calcExpiry(s,donor.id);
          const sLast=latestTestDate(s);
          const sMs=monStatus(s,donor.id);
          const sDays=sExp?Math.round((sExp-new Date())/86400000):null;
          const icon=sMs==="overdue"?"🔴":sMs==="due_soon"?"🟡":sMs==="ok"?"🟢":sMs==="deferred"?"🔵":"⚪";
          const dateColor=sMs==="overdue"?"#c0392b":sMs==="due_soon"?"#b07000":sMs==="deferred"?"#0055bb":sMs==="ok"?"#0a7a46":"#888";
          const daysText=sDays===null?"":sDays<0?`${Math.abs(sDays)}d overdue`:sMs==="deferred"?`${sDays}d (deferred)`:`${sDays}d left`;
          return `<div style="margin-bottom:7px;padding:6px 8px;border-radius:5px;background:${sMs==="overdue"?"#fff8f8":sMs==="due_soon"?"#fffdf0":sMs==="deferred"?"#f0f6ff":sMs==="ok"?"#f0fff8":"#f7f8fa"};border:1px solid ${sMs==="overdue"?"#ffc0c0":sMs==="due_soon"?"#fde8c0":sMs==="deferred"?"#c0d8f8":sMs==="ok"?"#c3f0da":"#e0e0e0"}">
            <div style="font-size:9px;font-weight:600;color:#555;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(s.name)}</div>
            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
              <span style="font-size:9px">${icon}</span>
              ${sLast?`<span style="font-size:9px;color:#888">Last: ${fmtD(sLast)}</span>`:""}
              ${sExp?`<span style="font-size:9px;font-weight:700;color:${dateColor}">Due: ${fmtD(sExp)}</span>`:""}
              ${daysText?`<span style="font-size:9px;color:${dateColor}">(${daysText})</span>`:""}
            </div>
          </div>`;
        }).join("")}
      </div>`;

      // Management Decision cell
      const decisionCell=`<div style="padding:10px 12px">
        ${subsWith2024.length===0?`<span style="color:#bbb;font-size:10px">—</span>`:subsWith2024.map(s=>{
          const dec=getRetestDecision(donor.id,s.id);
          const lastD=latestTestDate(s);
          const lastYear=lastD?lastD.getFullYear():null;
          const addYears=lastYear&&lastYear<=2024?2:1;
          const retestYear=lastYear?lastYear+addYears:"—";
          const standardDue=lastD?new Date(new Date(lastD).setFullYear(lastD.getFullYear()+addYears)):null;
          const deferDate=standardDue?new Date(new Date(standardDue).setMonth(standardDue.getMonth()+12)):null;
          const deferLabel=deferDate?fmtD(deferDate):"next year";
          return `<div style="margin-bottom:8px;padding-bottom:8px;border-bottom:0.5px dashed #e0e0e0">
            <div style="font-size:9px;font-weight:600;color:#555;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(s.name)}</div>
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;margin-bottom:4px;padding:4px 7px;border-radius:6px;border:1px solid ${dec==="now"?"#ffc0c0":"#e0e3ea"};background:${dec==="now"?"#fff0f0":"#fafbfc"}">
              <input type="checkbox" ${dec==="now"?"checked":""} onchange="toggleRetestNow('${donor.id}','${s.id}',this.checked)" onclick="event.stopPropagation()" style="width:12px;height:12px;cursor:pointer;accent-color:#c0392b"/>
              <div style="font-size:10px"><div style="color:${dec==="now"?"#c0392b":"#555"};font-weight:${dec==="now"?"700":"500"}">Retest Now</div><div style="font-size:8px;color:#aaa">Target: ${retestYear}</div></div>
            </label>
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;padding:4px 7px;border-radius:6px;border:1px solid ${dec==="next"?"#c0d8f8":"#e0e3ea"};background:${dec==="next"?"#f0f6ff":"#fafbfc"}">
              <input type="checkbox" ${dec==="next"?"checked":""} onchange="toggleRetestNext('${donor.id}','${s.id}',this.checked)" onclick="event.stopPropagation()" style="width:12px;height:12px;cursor:pointer;accent-color:#0073ea"/>
              <div style="font-size:10px"><div style="color:${dec==="next"?"#0055bb":"#555"};font-weight:${dec==="next"?"700":"500"}">Defer</div><div style="font-size:8px;color:#aaa">Skip ${retestYear} → ${deferLabel}</div></div>
            </label>
          </div>`;
        }).join("")}
      </div>`;

      h+=`<div style="display:grid;grid-template-columns:${cg};border-bottom:0.5px solid #e8eaed;align-items:start">
        ${productCell}${testCell}${scheduleCell}${decisionCell}
      </div>`;
    });

    h+=`</div><div style="margin-top:8px;font-size:10px;color:#aaa;text-align:right">🟢 On Track >6mo · 🟡 Due Soon <6mo · 🔴 Retest Due = past due · Defer adds +12mo to due date</div>`;
  }
  h+=`</div>`;
  wrap.innerHTML=h;
}

// ── TEST EXPENSE TAB ──────────────────────────────────────────────────────────
function parseCost(str){
  if(!str) return null;
  const m=str.replace(/,/g,"").match(/\$?([\d]+\.?[\d]*)/);
  return m?parseFloat(m[1]):null;
}

function testCategory(name){
  const n=(name||"").toLowerCase();
  if(/tensile|mbs|break|load|fatigue|pull|mechanical|performance|elongation|abrasion|spindle|ratchet|physical|durability|impact|compression|lashing|capacity|welding/i.test(n)) return "Mechanical";
  if(/chemical|prop65|reach|phthalate|svhc|rohs|heavy metal|flame|toxic|cadmium|lead|substance|restricted/i.test(n)) return "Chemical";
  if(/corrosion|salt spray|coating|rust|zinc|plating|astm b117/i.test(n)) return "Corrosion";
  if(/packaging|labeling|label|documentation|marking|claim|verification|audit|safety risk|regulatory|compliance/i.test(n)) return "Regulatory";
  return "Other";
}

function buildExpenseRows(){
  const all=[];
  GROUPS.forEach(g=>g.items.forEach(item=>{
    const siblings=[];
    GROUPS.forEach(g2=>g2.items.forEach(i2=>{
      if(i2.id!==item.id&&i2.parentSku&&i2.parentSku===item.parentSku) siblings.push(i2.name);
    }));
    item.subs.forEach(sub=>{
      [[sub.p24,"2024"],[sub.p25,"2025"],[sub.p26,"2026"]].forEach(([blocks,yr])=>{
        if(!blocks||!blocks.length) return;
        blocks.forEach(b=>{
          const cost=parseCost(b.cost);
          if(cost===null) return;
          all.push({
            group:g.title,groupColor:g.color,
            item,siblings,
            subName:sub.name,
            category:testCategory(sub.name),
            year:yr,
            supplier:b.supplier||"",
            lab:b.lab||"",
            date:b.date||"",
            result:b.result||"",
            cost,costRaw:b.cost||"",
            priority:(item.prioritySku||"").trim(),
          });
        });
      });
    });
  }));
  return all;
}

function renderExpense(){
  const wrap=document.getElementById("board-wrap"); if(!wrap) return;
  if(!GROUPS.length){
    wrap.innerHTML=`<div style="text-align:center;padding:64px;color:#aaa"><div style="font-size:48px">💰</div><div style="font-size:14px;margin-top:12px">Sync data first to see test expense data.</div></div>`;
    return;
  }

  const allRows=buildExpenseRows();

  // Apply filters
  let rows=[...allRows];
  if(expFilterPriority!=="ALL") rows=rows.filter(r=>r.priority.toLowerCase()===expFilterPriority.toLowerCase());
  if(expFilterCategory!=="ALL") rows=rows.filter(r=>r.category===expFilterCategory);
  if(expFilterYear!=="ALL") rows=rows.filter(r=>r.year===expFilterYear);

  // ── Aggregations ──
  const totalCost=rows.reduce((s,r)=>s+r.cost,0);
  const byYear={2024:0,2025:0,2026:0};
  rows.forEach(r=>{if(byYear[r.year]!==undefined) byYear[r.year]+=r.cost;});
  const byCat={};
  rows.forEach(r=>{byCat[r.category]=(byCat[r.category]||0)+r.cost;});
  const bySupplier={};
  rows.forEach(r=>{if(r.supplier) bySupplier[r.supplier]=(bySupplier[r.supplier]||0)+r.cost;});
  const byGroup={};
  rows.forEach(r=>{byGroup[r.group]=(byGroup[r.group]||0)+r.cost;});
  // Sub-category breakdown (by actual subtest name within selected category)
  const bySubCat={};
  rows.forEach(r=>{
    const key=r.subName;
    bySubCat[key]=(bySubCat[key]||0)+r.cost;
  });

  const catColors={Mechanical:"#0073ea",Chemical:"#00c875",Corrosion:"#fdab3d",Regulatory:"#a358df",Other:"#c4c4c4"};
  const yearColors={"2024":"#0073ea","2025":"#00c875","2026":"#e2445c"};
  const groupColorPalette=["#0073ea","#00c875","#fdab3d","#e2445c","#a358df","#579bfc","#66ccff","#ff7f50"];

  const fmt=n=>n===null?"—":"$"+n.toFixed(2);
  const fmtK=n=>n>=1000?"$"+(n/1000).toFixed(1)+"k":"$"+n.toFixed(0);
  const catEntries=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  const topSuppliers=Object.entries(bySupplier).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const groupEntries=Object.entries(byGroup).sort((a,b)=>b[1]-a[1]).slice(0,6);
  // Top sub-categories (by subtest name) for selected category or all
  const topSubCats=Object.entries(bySubCat).sort((a,b)=>b[1]-a[1]).slice(0,10);

  // ── Bar chart helper ──
  function barChart(data,height=120){
    if(!data.length) return `<div style="color:#bbb;font-size:11px;text-align:center;padding:20px">No data</div>`;
    const maxV=Math.max(...data.map(d=>d[1]),1);
    return `<div style="display:flex;align-items:flex-end;gap:4px;height:${height}px;padding:8px 0 0">
      ${data.map(([label,val,color])=>{
        const h2=Math.max(4,Math.round((val/maxV)*(height-24)));
        return `<div style="display:flex;flex-direction:column;align-items:center;flex:1;min-width:0">
          <div style="font-size:8px;color:#555;font-weight:600;margin-bottom:2px;text-align:center">${fmtK(val)}</div>
          <div style="width:100%;background:${color||"#0073ea"};border-radius:3px 3px 0 0;height:${h2}px"></div>
          <div style="font-size:7px;color:#888;margin-top:3px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;padding:0 1px">${esc(label.length>12?label.slice(0,12)+"…":label)}</div>
        </div>`;
      }).join("")}
    </div>`;
  }

  // ── Horizontal bar chart for sub-category breakdown ──
  function hBarChart(data){
    if(!data.length) return `<div style="color:#bbb;font-size:11px;padding:8px">No data</div>`;
    const maxV=Math.max(...data.map(d=>d[1]),1);
    return data.map(([label,val,color],i)=>{
      const pct=Math.max(2,Math.round(val/maxV*100));
      return `<div style="margin-bottom:7px">
        <div style="display:flex;justify-content:space-between;margin-bottom:2px">
          <span style="font-size:10px;color:#333;font-weight:${i<3?"600":"400"};flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:8px">${esc(label)}</span>
          <span style="font-size:10px;font-weight:600;color:${color||"#0073ea"};flex-shrink:0">${fmtK(val)}</span>
        </div>
        <div style="height:6px;background:#f0f0f0;border-radius:3px;overflow:hidden">
          <div style="height:100%;background:${color||"#0073ea"};border-radius:3px;width:${pct}%"></div>
        </div>
      </div>`;
    }).join("");
  }

  // ── Donut chart ──
  function donutChart(segments,size=130){
    const total=segments.reduce((s,[,v])=>s+v,0);
    if(!total) return `<div style="color:#bbb;font-size:11px;text-align:center;padding:20px">No data</div>`;
    let angle=-90;
    const cx=size/2,cy=size/2,r=size*0.38,ir=size*0.22;
    const paths=segments.map(([,val,color])=>{
      const a=Math.max(0.1,(val/total)*360);
      const r1=angle*(Math.PI/180),r2=(angle+a)*(Math.PI/180);
      const x1=cx+r*Math.cos(r1),y1=cy+r*Math.sin(r1);
      const x2=cx+r*Math.cos(r2),y2=cy+r*Math.sin(r2);
      const xi1=cx+ir*Math.cos(r1),yi1=cy+ir*Math.sin(r1);
      const xi2=cx+ir*Math.cos(r2),yi2=cy+ir*Math.sin(r2);
      const laf=a>180?1:0;
      const d=`M${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r} 0 ${laf},1 ${x2.toFixed(1)},${y2.toFixed(1)} L${xi2.toFixed(1)},${yi2.toFixed(1)} A${ir},${ir} 0 ${laf},0 ${xi1.toFixed(1)},${yi1.toFixed(1)} Z`;
      angle+=a;
      return `<path d="${d}" fill="${color}" stroke="#fff" stroke-width="1.5"/>`;
    });
    return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      ${paths.join("")}
      <text x="${cx}" y="${cy-3}" text-anchor="middle" font-size="11" font-weight="700" fill="#333">${fmtK(total)}</text>
      <text x="${cx}" y="${cy+10}" text-anchor="middle" font-size="8" fill="#888">Total</text>
    </svg>`;
  }

  // Priority filter buttons
  const pBtnE=(val,lbl)=>`<button onclick="expFilterPriority='${val}';renderExpense()" style="font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;cursor:pointer;border:1px solid ${expFilterPriority===val?"#0073ea":"#dde0e7"};background:${expFilterPriority===val?"#0073ea":"#fff"};color:${expFilterPriority===val?"#fff":"#555"}">${lbl}</button>`;
  const cBtnE=(val,lbl,color)=>`<button onclick="expFilterCategory='${val}';renderExpense()" style="font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;cursor:pointer;border:1px solid ${expFilterCategory===val?color:"#dde0e7"};background:${expFilterCategory===val?color:"#fff"};color:${expFilterCategory===val?"#fff":"#555"}">${lbl}</button>`;
  const yBtnE=(val,lbl,color)=>`<button onclick="expFilterYear='${val}';renderExpense()" style="font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;cursor:pointer;border:1px solid ${expFilterYear===val?color:"#dde0e7"};background:${expFilterYear===val?color:"#fff"};color:${expFilterYear===val?"#fff":"#555"}">${lbl}</button>`;

  const hasFilter=expFilterPriority!=="ALL"||expFilterCategory!=="ALL"||expFilterYear!=="ALL";

  let h=`<div style="padding:14px 18px">`;

  // ── Filter bar ──
  h+=`<div style="background:#fff;border:1.5px solid #e0e3ea;border-radius:10px;padding:10px 14px;margin-bottom:14px">
    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:8px">
      <span style="font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.4px">Priority SKU:</span>
      ${pBtnE("ALL","All")}
      ${pBtnE("Retail","★ Retail")}
      ${pBtnE("A","A SKU")}
      ${pBtnE("B","B SKU")}
      ${pBtnE("C","C SKU")}
      ${pBtnE("NPD","NPD")}
      ${hasFilter?`<button onclick="expFilterPriority='ALL';expFilterCategory='ALL';expFilterYear='ALL';renderExpense()" style="margin-left:8px;font-size:11px;color:#e2445c;background:none;border:none;cursor:pointer;font-weight:500">✕ Clear filters</button>`:""}
      <button onclick="exportExpenseCSV()" style="margin-left:auto;display:inline-flex;align-items:center;gap:5px;padding:5px 14px;font-size:11px;font-weight:600;color:#0a7a46;background:#f0fff8;border:1.5px solid #c3f0da;border-radius:7px;cursor:pointer">📊 Export Excel</button>
    </div>
    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px">
      <span style="font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.4px">Category:</span>
      ${cBtnE("ALL","All","#555")}
      ${cBtnE("Mechanical","⚙ Mechanical","#0073ea")}
      ${cBtnE("Chemical","🧪 Chemical","#00c875")}
      ${cBtnE("Corrosion","🛡 Corrosion","#fdab3d")}
      ${cBtnE("Regulatory","📋 Regulatory","#a358df")}
      ${cBtnE("Other","Other","#888")}
    </div>
    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
      <span style="font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.4px">Year:</span>
      ${yBtnE("ALL","All","#555")}
      ${yBtnE("2024","2024","#0073ea")}
      ${yBtnE("2025","2025","#00c875")}
      ${yBtnE("2026","2026","#e2445c")}
    </div>
  </div>`;

  // ── KPI Summary cards ──
  h+=`<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px">
    <div style="flex:1;min-width:110px;background:#fff;border:2px solid #0073ea;border-radius:10px;padding:12px 14px;position:relative;overflow:hidden">
      <div style="position:absolute;top:0;left:0;right:0;height:3px;background:#0073ea"></div>
      <div style="font-size:10px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">${hasFilter?"Filtered Spend":"Total Spend"}</div>
      <div style="font-size:26px;font-weight:700;color:#0073ea">${fmtK(totalCost)}</div>
      <div style="font-size:9px;color:#aaa">${rows.length} entries${hasFilter?" (filtered)":""}</div>
    </div>
    ${[["2024",byYear[2024],"#0073ea","#c0d8f8"],["2025",byYear[2025],"#00c875","#c3f0da"],["2026",byYear[2026],"#e2445c","#ffd5d5"]].map(([yr,val,c,bc])=>`
    <div style="flex:1;min-width:100px;background:#fff;border:1.5px solid ${bc};border-radius:10px;padding:12px 14px;position:relative;overflow:hidden">
      <div style="position:absolute;top:0;left:0;right:0;height:3px;background:${c}"></div>
      <div style="font-size:10px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">${yr}</div>
      <div style="font-size:22px;font-weight:700;color:${c}">${fmtK(val)}</div>
      <div style="font-size:9px;color:#aaa">${rows.filter(r=>r.year===yr).length} entries</div>
    </div>`).join("")}
    <div style="flex:1;min-width:100px;background:#fff;border:1.5px solid #fde8c0;border-radius:10px;padding:12px 14px;position:relative;overflow:hidden">
      <div style="position:absolute;top:0;left:0;right:0;height:3px;background:#fdab3d"></div>
      <div style="font-size:10px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Top Category</div>
      <div style="font-size:14px;font-weight:700;color:#b07000">${catEntries[0]?catEntries[0][0]:"—"}</div>
      <div style="font-size:13px;font-weight:700;color:#b07000">${catEntries[0]?fmtK(catEntries[0][1]):"$0"}</div>
    </div>
  </div>`;

  // ── Charts row 1 ──
  h+=`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px">
    <div style="background:#fff;border:1.5px solid #e0e3ea;border-radius:10px;padding:14px">
      <div style="font-size:11px;font-weight:700;color:#333;margin-bottom:2px">📅 Yearly Spend</div>
      <div style="font-size:9px;color:#aaa;margin-bottom:6px">Total cost by year</div>
      ${barChart([["2024",byYear["2024"],yearColors["2024"]],["2025",byYear["2025"],yearColors["2025"]],["2026",byYear["2026"],yearColors["2026"]]],120)}
    </div>
    <div style="background:#fff;border:1.5px solid #e0e3ea;border-radius:10px;padding:14px">
      <div style="font-size:11px;font-weight:700;color:#333;margin-bottom:2px">🧪 By Test Category</div>
      <div style="font-size:9px;color:#aaa;margin-bottom:6px">Cost distribution</div>
      <div style="display:flex;align-items:center;gap:10px">
        ${donutChart(catEntries.map(([k,v])=>[k,v,catColors[k]||"#ccc"]),110)}
        <div style="flex:1">
          ${catEntries.map(([k,v])=>`<div style="display:flex;align-items:center;gap:4px;margin-bottom:4px">
            <div style="width:8px;height:8px;border-radius:2px;background:${catColors[k]||"#ccc"};flex-shrink:0"></div>
            <div style="flex:1;min-width:0;font-size:9px;color:#444;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(k)}</div>
            <div style="font-size:9px;font-weight:600;color:#555;flex-shrink:0">${totalCost>0?Math.round(v/totalCost*100):0}%</div>
          </div>`).join("")}
        </div>
      </div>
    </div>
    <div style="background:#fff;border:1.5px solid #e0e3ea;border-radius:10px;padding:14px">
      <div style="font-size:11px;font-weight:700;color:#333;margin-bottom:2px">📦 By Product Group</div>
      <div style="font-size:9px;color:#aaa;margin-bottom:6px">Top 6 groups</div>
      ${barChart(groupEntries.map(([k,v],i)=>[k,v,groupColorPalette[i]]),120)}
    </div>
  </div>`;

  // ── Charts row 2: Stacked supplier bar + breakdown ──
  // Build stacked data: for each top supplier, cost split by category
  const allCats=Object.keys(catColors);
  const supplierStacks=topSuppliers.map(([sup,total])=>{
    const byCatForSup={};
    rows.forEach(r=>{if(r.supplier===sup) byCatForSup[r.category]=(byCatForSup[r.category]||0)+r.cost;});
    return {sup,total,byCatForSup};
  });
  const maxStack=Math.max(...supplierStacks.map(s=>s.total),1);
  const stackHeight=130;

  const stackedBar=supplierStacks.map(({sup,total,byCatForSup})=>{
    const totalH=Math.max(4,Math.round((total/maxStack)*stackHeight));
    const segments=allCats.filter(c=>byCatForSup[c]>0).map(c=>{
      const h2=Math.max(1,Math.round((byCatForSup[c]/total)*totalH));
      return `<div title="${esc(c)}: ${fmtK(byCatForSup[c])}" style="width:100%;height:${h2}px;background:${catColors[c]};"></div>`;
    });
    return `<div style="display:flex;flex-direction:column;align-items:center;flex:1;min-width:0">
      <div style="font-size:8px;color:#555;font-weight:600;margin-bottom:2px">${fmtK(total)}</div>
      <div style="width:100%;display:flex;flex-direction:column;justify-content:flex-end;height:${stackHeight}px;border-radius:3px 3px 0 0;overflow:hidden;background:#f5f5f5">
        <div style="display:flex;flex-direction:column-reverse;width:100%">${segments.join("")}</div>
      </div>
      <div style="font-size:7px;color:#888;margin-top:3px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;padding:0 1px">${esc(sup.length>14?sup.slice(0,14)+"…":sup)}</div>
    </div>`;
  }).join("");

  h+=`<div style="display:grid;grid-template-columns:1.5fr 1fr;gap:12px;margin-bottom:14px">
    <div style="background:#fff;border:1.5px solid #e0e3ea;border-radius:10px;padding:14px">
      <div style="font-size:11px;font-weight:700;color:#333;margin-bottom:2px">🏭 Spend by Supplier (Top 8)</div>
      <div style="font-size:9px;color:#aaa;margin-bottom:6px">Stacked by test category · hover for details</div>
      <div style="display:flex;align-items:flex-end;gap:4px;height:${stackHeight+24}px;padding-top:8px">${stackedBar}</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;padding-top:8px;border-top:0.5px solid #f0f0f0">
        ${allCats.map(c=>`<div style="display:flex;align-items:center;gap:4px"><div style="width:8px;height:8px;border-radius:2px;background:${catColors[c]}"></div><span style="font-size:9px;color:#555">${c}</span></div>`).join("")}
      </div>
    </div>
    <div style="background:#fff;border:1.5px solid #e0e3ea;border-radius:10px;padding:14px">
      <div style="font-size:11px;font-weight:700;color:#333;margin-bottom:2px">🔬 Test Cost Breakdown${expFilterCategory!=="ALL"?` · ${expFilterCategory}`:""}</div>
      <div style="font-size:9px;color:#aaa;margin-bottom:8px">${expFilterCategory!=="ALL"?`Top tests within ${expFilterCategory}`:"Highest cost tests (all categories)"}</div>
      ${hBarChart(topSubCats.map(([k,v],i)=>[k,v,expFilterCategory!=="ALL"?(catColors[expFilterCategory]||"#0073ea"):groupColorPalette[i%8]]))}

function openSiblingModal(itemId){
  let found=null;
  GROUPS.forEach(g=>g.items.forEach(i=>{ if(i.id===itemId) found=i; }));
  if(!found) return;
  const siblings=[];
  GROUPS.forEach(g=>g.items.forEach(i=>{
    if(i.id!==found.id&&i.parentSku&&i.parentSku===found.parentSku) siblings.push(i.name);
  }));
  openModal({type:"siblings",name:found.name,parentSku:found.parentSku,siblings});
}

function downloadXLSX(wb, filename){
  if(typeof XLSX==="undefined"){
    // XLSX not loaded yet - wait for CDN then retry
    alert("Loading Excel library, please try again in a moment...");
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload=function(){ alert("Excel library loaded! Please click Export Excel again."); };
    document.head.appendChild(s);
    return;
  }
  try{
    const wbout=XLSX.write(wb,{bookType:"xlsx",type:"base64"});
    const a=document.createElement("a");
    a.href="data:application/vnd.openxmlformats-officedocument.spreadsheetml.sheet;base64,"+wbout;
    a.download=filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }catch(e){ alert("Export failed: "+e.message); }
}

function exportExpenseCSV(){
  if(typeof XLSX==="undefined"){ alert("Excel library not loaded. Please check your internet connection."); return; }
  const data=[["Product","Test Name","Category","Group","Supplier","Test Lab","Date","Year","Result","Cost ($)"]];
  GROUPS.forEach(g=>g.items.forEach(item=>{
    item.subs.forEach(sub=>{
      [["2024",sub.p24],["2025",sub.p25],["2026",sub.p26]].forEach(([yr,blocks])=>{
        if(!blocks) return;
        blocks.forEach(b=>{
          const cost=parseCost(b.cost);
          if(cost===null) return;
          data.push([item.name,sub.name,testCategory(sub.name),g.title,b.supplier||"",b.lab||"",b.date||"",yr,b.result||"",cost]);
        });
      });
    });
  }));
  const ws=XLSX.utils.aoa_to_sheet(data);
  ws["!cols"]=[{wch:25},{wch:35},{wch:14},{wch:20},{wch:30},{wch:15},{wch:14},{wch:8},{wch:10},{wch:10}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Test Expense");
  downloadXLSX(wb,"Test-Expense-"+new Date().toISOString().slice(0,10)+".xlsx");
}

            </button>
          </div>
        </div>
      </div>
    </div>`;
  }
}

function exportMonitoringExcel(){
  if(typeof XLSX==="undefined"){ alert("Excel library not loaded. Please check your internet connection."); return; }
  const data=[["Product Group","SKU","Siblings","Priority","Test Name","Last Tested","Next Due Date","Days Remaining","Status","Decision","Target Year","Defer Date"]];
  const allItems=[];
  GROUPS.forEach(g=>g.items.forEach(i=>allItems.push({g,i})));
  const byParent={};
  allItems.forEach(({g,i})=>{const k=i.parentSku||i.rowId;if(!byParent[k])byParent[k]=[];byParent[k].push({g,i});});
  Object.values(byParent).forEach(siblings=>{
    const de=siblings.find(({i})=>i.subs.some(s=>s.p24.length||s.p25.length||s.p26.length));
    if(!de) return;
    const {g,i:donor}=de;
    const sibNames=siblings.filter(({i})=>i.id!==donor.id).map(({i})=>i.name).join(", ");
    const subs=donor.subs.filter(s=>(s.p24&&s.p24.length>0)||(s.p25&&s.p25.length>0)||(s.p26&&s.p26.length>0));
    subs.forEach(s=>{
      const dec=getRetestDecision(donor.id,s.id);
      const sLast=latestTestDate(s);
      const sExp=calcExpiry(s,donor.id);
      const sMs=monStatus(s,donor.id);
      const sDays=sExp?Math.round((sExp-new Date())/86400000):null;
      const lastYear=sLast?sLast.getFullYear():null;
      const addYears=lastYear&&lastYear<=2024?2:1;
      const retestYear=lastYear?lastYear+addYears:"";
      const standardDue=sLast?new Date(new Date(sLast).setFullYear(sLast.getFullYear()+addYears)):null;
      const deferDate=standardDue?new Date(new Date(standardDue).setMonth(standardDue.getMonth()+12)):null;
      data.push([g.title,donor.name,sibNames,donor.prioritySku||"",s.name,sLast?fmtD(sLast):"",sExp?fmtD(sExp):"",sDays!==null?sDays:"",sMs==="overdue"?"Retest Due":sMs==="due_soon"?"Due Soon":sMs==="ok"?"On Track":sMs==="deferred"?"Deferred":"No Test",dec==="now"?"Retest Now":dec==="next"?"Defer":"",retestYear,deferDate?fmtD(deferDate):""]);
    });
  });
  const ws=XLSX.utils.aoa_to_sheet(data);
  ws["!cols"]=[{wch:20},{wch:22},{wch:30},{wch:10},{wch:35},{wch:14},{wch:14},{wch:12},{wch:14},{wch:14},{wch:10},{wch:14}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Monitoring");
  downloadXLSX(wb,"Compliance-Monitoring-"+new Date().toISOString().slice(0,10)+".xlsx");
}
function switchTab(t){
  activeTab=t;
  document.getElementById("tab-table").className="tab-btn"+(t==="table"?" active":"");
  document.getElementById("tab-monitoring").className="tab-btn"+(t==="monitoring"?" active":"");
  document.getElementById("tab-expense").className="tab-btn"+(t==="expense"?" active":"");
  const kpiEl=document.getElementById("kpi-section");
  if(kpiEl) kpiEl.style.display=t==="table"?"":"none";
  const tbEl=document.getElementById("toolbar-wrap");
  if(tbEl) tbEl.style.display=t==="table"?"flex":"none";
  if(t==="table") renderTable();
  else if(t==="monitoring") renderMonitoring();
  else renderExpense();
}

function openModal(m){ modal=m; renderModals(); }
function closeModal(){ modal=null; renderModals(); }

function openWebsiteModal(itemId){
  let found=null;
  GROUPS.forEach(g=>g.items.forEach(i=>{ if(i.id===itemId) found=i; }));
  if(found&&found.websiteUrl) openModal({type:"website",url:found.websiteUrl,name:found.name});
}

function openComplianceModal(itemId){
  let found=null;
  GROUPS.forEach(g=>g.items.forEach(i=>{ if(i.id===itemId) found=i; }));
  if(found) openModal({type:"compliance",data:found});
}

function openDetail(sid,iid,gid){
  const g=GROUPS.find(x=>x.id===gid);
  const item=g&&g.items.find(x=>x.id===iid);
  const sub=item&&item.subs.find(x=>x.id===sid);
  if(sub) openModal({type:"detail",data:sub});
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
(function boot(){
  try{
    if(window.__PRELOADED_GROUPS__){
      GROUPS=window.__PRELOADED_GROUPS__;
      lastSynced=window.__PRELOADED_SYNCED__||"";
      if(window.__PRELOADED_DECISIONS__){
        retestDecisions=window.__PRELOADED_DECISIONS__;
        localStorage.setItem(LS_RETEST,JSON.stringify(retestDecisions));
      }
      GROUPS.forEach(g=>{gExp[g.id]=true;g.items.forEach(i=>{iExp[i.id]=false;});});
      const ti=GROUPS.reduce((a,g)=>a+g.items.length,0);
      const ts=GROUPS.reduce((a,g)=>a+g.items.reduce((b,i)=>b+i.subs.length,0),0);
      setSyncUI("done","Compliance Dashboard",`Last synced: ${lastSynced} · ${ti} products · ${ts} test types`,100);
      renderAll();
      return;
    }
    // Otherwise load from localStorage (this browser's last live sync)
    const cached=localStorage.getItem(LS_CACHE);
    const synced=localStorage.getItem(LS_SYNCED);
    if(cached&&synced){
      GROUPS=JSON.parse(cached);
      lastSynced=fmtDate(synced);
      GROUPS.forEach(g=>{gExp[g.id]=true;g.items.forEach(i=>{iExp[i.id]=false;});});
      const ti=GROUPS.reduce((a,g)=>a+g.items.length,0);
      const ts=GROUPS.reduce((a,g)=>a+g.items.reduce((b,i)=>b+i.subs.length,0),0);
      // Amber "stale" state — this is cached data, not yet confirmed fresh this session.
      setSyncUI("stale","Compliance Dashboard (cached)",`Last synced: ${lastSynced} · ${ti} products · ${ts} test types — click Re-sync for the latest`,0);
      setTimeout(()=>promptSync(), 900); // let the page render first, then ask
    }
  }catch(e){ GROUPS=[]; }
  renderAll();
})();
</script>
