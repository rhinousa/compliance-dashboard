<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Compliance Dashboard — Rhino USA</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;min-height:100vh}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.spin{animation:spin .8s linear infinite;display:inline-block;width:13px;height:13px;border:2px solid #c7dcf8;border-top-color:#0073ea;border-radius:50%;vertical-align:middle;flex-shrink:0}

/* Toolbar */
.toolbar-group{display:flex;align-items:center;border:1.5px solid #c8cdd7;border-radius:8px;overflow:visible;background:#fff;flex-shrink:0}
.tb{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;font-size:12px;font-weight:500;color:#444;background:#fff;border:none;border-right:1px solid #dde0e7;cursor:pointer;position:relative;white-space:nowrap;transition:all .15s;height:34px;line-height:1}
.tb:last-child{border-right:none}.tb:first-child{border-radius:6px 0 0 6px}.tb:last-child{border-radius:0 6px 6px 0}.tb:only-child{border-radius:6px}
.tb svg{flex-shrink:0;opacity:.65}.tb:hover{background:#f0f6ff;color:#0073ea}.tb:hover svg{opacity:1}.tb.on{background:#e8f2ff;color:#0073ea;font-weight:600}.tb.on svg{opacity:1}
.dp{position:absolute;top:calc(100% + 8px);left:0;background:#fff;border:1.5px solid #dde0e7;border-radius:10px;box-shadow:0 10px 32px rgba(0,0,0,.14);z-index:99;min-width:220px;padding:6px 0;animation:fadeDown .14s ease}
.dpi{padding:8px 16px;font-size:12px;color:#333;cursor:pointer;display:flex;align-items:center;gap:8px}.dpi:hover{background:#f0f6ff;color:#0073ea}.dpi.sel{color:#0073ea;font-weight:600}
.dps{height:1px;background:#eee;margin:4px 0}.dpl{padding:7px 16px 3px;font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.7px}
.ir{cursor:pointer}.ir:hover{background:#f0f6ff!important}.sr{cursor:pointer}.sr:hover{background:#eef1ff!important}.gh:hover{background:#eaecf2!important}
.comp-cell{transition:background .12s}.comp-cell:hover{background:#e8f4ff!important}
.rpt{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;color:#0073ea;padding:3px 8px;border-radius:4px;background:#e8f2ff;border:1px solid #c0d8f8;text-decoration:none;margin-top:4px}.rpt:hover{background:#d0e6ff}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap}
.modal-wrap{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;overflow-y:auto}
.modal-box{background:#fff;border-radius:12px;width:100%;max-height:88vh;overflow:auto;box-shadow:0 16px 48px rgba(0,0,0,.22);animation:fadeDown .18s ease}
.kpi-card{background:#fff;border:1.5px solid #e8eaed;border-radius:10px;padding:14px 18px;flex:1;min-width:140px;position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi-pass::before{background:#00c875}.kpi-fail::before{background:#e2445c}.kpi-pending::before{background:#fdab3d}.kpi-total::before{background:#0073ea}
/* pills */
.cs-pill{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:700;padding:2px 7px;border-radius:12px;white-space:nowrap}
.cs-yes{background:#e3f9ee;color:#0a7a46;border:1px solid #c3f0da}
.cs-no{background:#f7f8fa;color:#aaa;border:1px solid #e0e0e0}
/* priority badges */
.p1b{background:#fff0f5;color:#c0125a;border:1px solid #ffc0d9;font-size:9px;padding:1px 6px;border-radius:20px;font-weight:700;white-space:nowrap;display:inline-block}
.p2b{background:#fff8e0;color:#b07000;border:1px solid #fde8c0;font-size:9px;padding:1px 6px;border-radius:20px;font-weight:700;white-space:nowrap;display:inline-block}
.p3b{background:#f0efff;color:#5b21b6;border:1px solid #d8d0f8;font-size:9px;padding:1px 6px;border-radius:20px;font-weight:700;white-space:nowrap;display:inline-block}
.p4b{background:#f7f8fa;color:#666;border:1px solid #e0e0e0;font-size:9px;padding:1px 6px;border-radius:20px;font-weight:700;white-space:nowrap;display:inline-block}
/* monitoring */
.mon-ok{color:#0a7a46;font-weight:700}.mon-soon{color:#b07000;font-weight:700}.mon-over{color:#c0392b;font-weight:700;animation:pulse 2s infinite}.mon-none{color:#aaa}
/* banners */
.refresh-banner{background:#fff;border:1.5px solid #e0e3ea;border-radius:12px;padding:12px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.refresh-banner.ready{border-color:rgba(245,158,11,.45);background:rgba(245,158,11,.04)}
.refresh-banner.stale{border-color:rgba(245,158,11,.5);background:rgba(245,158,11,.07)}
.refresh-banner.loading{border-color:rgba(0,115,234,.35);background:rgba(0,115,234,.04)}
.refresh-banner.done{border-color:rgba(0,200,117,.45);background:rgba(0,200,117,.05)}
.refresh-banner.error{border-color:rgba(226,68,92,.4);background:rgba(226,68,92,.05)}
.refresh-info{display:flex;flex-direction:column;gap:3px;flex:1;min-width:0}
.refresh-title{font-size:13px;font-weight:600;color:#222}.refresh-sub{font-size:11px;color:#888}
.refresh-btn{display:inline-flex;align-items:center;gap:7px;padding:8px 18px;font-size:12px;font-weight:600;border-radius:7px;border:none;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0}
.refresh-btn.idle{background:#0073ea;color:#fff}.refresh-btn.idle:hover{background:#005cc8}
.refresh-btn.loading{background:#e8f2ff;color:#0073ea;cursor:not-allowed;border:1px solid #c0d8f8}
.refresh-btn.done{background:#e3f9ee;color:#0a7a46;cursor:pointer;border:1px solid #c3f0da}.refresh-btn.done:hover{background:#d0f5e0}
.refresh-btn.error{background:#ffe8e8;color:#c0392b;cursor:pointer;border:1px solid #ffd5d5}
.field-input{width:100%;padding:9px 12px;border:1.5px solid #c8cdd7;border-radius:7px;font-size:12px;color:#333;font-family:monospace;margin-top:5px;margin-bottom:12px}
.field-input:focus{outline:none;border-color:#0073ea;box-shadow:0 0 0 3px rgba(0,115,234,.1)}
.info-box{background:#f0f6ff;border:1px solid #c0d8f8;border-radius:7px;padding:10px 13px;font-size:11px;color:#0055bb;line-height:1.6;margin-bottom:12px}
.warn-box{background:#fff8e0;border:1px solid #fde8c0;border-radius:7px;padding:10px 13px;font-size:11px;color:#7a5500;line-height:1.6;margin-bottom:14px}
.sync-cta{display:inline-flex;align-items:center;gap:8px;background:#0073ea;color:#fff;padding:10px 24px;border-radius:8px;font-size:13px;font-weight:600;border:none;cursor:pointer}.sync-cta:hover{background:#005cc8}
.tab-btn{padding:8px 16px;font-size:12px;background:none;border:none;border-bottom:2px solid transparent;color:rgba(255,255,255,.65);font-weight:500;cursor:pointer;white-space:nowrap}
.tab-btn.active{border-bottom-color:#fff;color:#fff;font-weight:700}
/* search — kept out of innerHTML cycle so typing is uninterrupted */
#search-wrap{position:relative;flex:1;min-width:160px;max-width:280px}
#search-wrap svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:#aaa;pointer-events:none}
#searchBox{width:100%;padding:6px 10px 6px 30px;border:1.5px solid #dde0e7;border-radius:7px;font-size:12px;background:#fafbfc;color:#333;outline:none;height:34px}
#searchBox:focus{border-color:#0073ea}
</style>
</head>
<body>

<!-- ── STATIC SHELL (never re-rendered) ─────────────────────────────────── -->
<div style="max-width:1400px;margin:0 auto;padding:0 20px 40px 20px">

  <!-- Header (static) -->
  <div style="background:#0073ea">
    <div style="padding:12px 18px 0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <span style="font-size:20px">📋</span>
        <span style="color:#fff;font-weight:700;font-size:15px" id="hdr-name">Compliance Dashboard</span>
        <span style="color:rgba(255,255,255,.5);font-size:11px" id="hdr-sub">Rhino USA</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div id="hdr-acctBtn" style="display:none;align-items:center;gap:6px;color:rgba(255,255,255,.6);font-size:11px">
          <span style="width:7px;height:7px;border-radius:50%;background:#00c875;display:inline-block;flex-shrink:0"></span>Signed in with Google
        </div>
      </div>
    </div>
    <div style="display:flex;margin-top:10px;padding:0 10px;border-top:1px solid rgba(255,255,255,.2)">
      <button class="tab-btn active" id="tab-table" onclick="switchTab('table')">Main Table</button>
      <button class="tab-btn" id="tab-monitoring" onclick="switchTab('monitoring')">Monitoring <span id="mon-badge" style="display:none;background:#e2445c;color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:700;margin-left:3px"></span></button>
      <button class="tab-btn" id="tab-expense" onclick="switchTab('expense')">💰 Test Expense</button>
    </div>
  </div>

  <!-- Sync banner (dynamic) -->
  <div id="sync-banner-wrap" style="padding:10px 18px;background:#fafbfc;border-bottom:1px solid #e8eaed">
    <div class="refresh-banner ready" id="banner">
      <div class="refresh-info">
        <div class="refresh-title" id="banner-title">Not connected</div>
        <div class="refresh-sub" id="banner-sub">Connect your Google Sheet to load live data</div>
        <div id="banner-progress" style="display:none;width:100%;height:3px;background:#e0e3ea;border-radius:2px;margin-top:8px;overflow:hidden"><div id="banner-bar" style="height:100%;background:#0073ea;border-radius:2px;width:0%;transition:width .4s ease"></div></div>
      </div>
      <button class="refresh-btn idle" id="syncBtn" onclick="triggerSync()">🔗 Connect &amp; Sync</button>
    </div>
  </div>

  <!-- KPI (dynamic) -->
  <div id="kpi-section"></div>

  <!-- Toolbar (dynamic — only the filter/sort parts; search is static) -->
  <!-- Toolbar: search + inline filter pills + sort -->
  <div id="toolbar-wrap" style="display:none;background:#fff;border-left:0.5px solid #dde0e7;border-right:0.5px solid #dde0e7;border-bottom:1px solid #e8eaed;padding:10px 18px 8px;flex-direction:column;gap:0">
    <!-- Row 1: Search + SKU + Sort + Clear -->
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px">
      <div id="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="searchBox" placeholder="Search products &amp; tests…" autocomplete="off" spellcheck="false" oninput="onSearch(this.value)"/>
      </div>
      <div style="position:relative;flex-shrink:0">
        <select id="skuSelect" onchange="onSkuSelect(this.value)" style="padding:6px 28px 6px 10px;border:1.5px solid #dde0e7;border-radius:7px;font-size:12px;background:#fafbfc;color:#333;outline:none;height:34px;cursor:pointer;appearance:none;min-width:140px;max-width:200px">
          <option value="">All SKUs</option>
        </select>
        <svg style="position:absolute;right:8px;top:50%;transform:translateY(-50%);pointer-events:none;color:#888" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div style="position:relative">
        <button class="tb" id="btn-sort" onclick="tDD('sort')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="6" y1="12" x2="18" y2="12"/><line x1="9" y1="18" x2="15" y2="18"/></svg>
          <span>Sort</span><span id="sort-badge" style="display:none;background:#0073ea;color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:700">1</span>
        </button>
        <div class="dp" id="dp-sort" style="display:none"></div>
      </div>
      <button id="clear-all-filters" onclick="clearAllFilters()" style="display:none;font-size:11px;color:#e2445c;background:none;border:1px solid #ffd5d5;cursor:pointer;font-weight:600;padding:4px 10px;border-radius:6px">&#10005; Clear all</button>
    </div>
    <!-- Filter rows -->
    <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding-top:4px">
      <!-- Country: pills (as-is) -->
      <div style="display:flex;align-items:center;gap:6px">
        <span style="font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.4px;flex-shrink:0">Country</span>
        <div id="fp-country" style="display:flex;gap:4px;flex-wrap:nowrap"></div>
      </div>
      <!-- Group: compact select -->
      <div style="display:flex;align-items:center;gap:6px">
        <span style="font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.4px;flex-shrink:0">Group</span>
        <div style="position:relative">
          <select id="fp-group-sel" onchange="setFG(this.value)" style="padding:4px 28px 4px 10px;border:1.5px solid #dde0e7;border-radius:20px;font-size:11px;font-weight:600;background:#fff;color:#333;outline:none;height:30px;cursor:pointer;appearance:none;min-width:140px"></select>
          <svg style="position:absolute;right:8px;top:50%;transform:translateY(-50%);pointer-events:none;color:#888" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
      <!-- Priority: compact select -->
      <div style="display:flex;align-items:center;gap:6px">
        <span style="font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.4px;flex-shrink:0">Priority</span>
        <div style="position:relative">
          <select id="fp-priority-sel" onchange="setFP(this.value)" style="padding:4px 28px 4px 10px;border:1.5px solid #dde0e7;border-radius:20px;font-size:11px;font-weight:600;background:#fff;color:#333;outline:none;height:30px;cursor:pointer;appearance:none;min-width:110px"></select>
          <svg style="position:absolute;right:8px;top:50%;transform:translateY(-50%);pointer-events:none;color:#888" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
      <!-- Result: compact select -->
      <div style="display:flex;align-items:center;gap:6px">
        <span style="font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.4px;flex-shrink:0">Result</span>
        <div style="position:relative">
          <select id="fp-result-sel" onchange="setFR(this.value)" style="padding:4px 28px 4px 10px;border:1.5px solid #dde0e7;border-radius:20px;font-size:11px;font-weight:600;background:#fff;color:#333;outline:none;height:30px;cursor:pointer;appearance:none;min-width:100px"></select>
          <svg style="position:absolute;right:8px;top:50%;transform:translateY(-50%);pointer-events:none;color:#888" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
      <!-- Date (as-is) -->
      <div style="display:flex;align-items:center;gap:6px">
        <span style="font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.4px;flex-shrink:0">Date</span>
        <input type="date" id="date-from" onchange="setDateFrom(this.value)" style="padding:3px 8px;border:1.5px solid #dde0e7;border-radius:6px;font-size:11px;color:#333;outline:none;height:28px"/>
        <span style="font-size:10px;color:#aaa">to</span>
        <input type="date" id="date-to" onchange="setDateTo(this.value)" style="padding:3px 8px;border:1.5px solid #dde0e7;border-radius:6px;font-size:11px;color:#333;outline:none;height:28px"/>
        <button id="clear-dates-btn" onclick="clearDates()" style="display:none;font-size:10px;color:#0073ea;background:none;border:none;cursor:pointer;padding:0">&#10005;</button>
      </div>
    </div>
  </div>

  <!-- Board body (dynamic) -->
  <div id="board-wrap"></div>
</div>

<!-- Modal container -->
<div id="modal-root"></div>

<script>
// ── CONFIG ─────────────────────────────────────────────────────────────────
// ▼▼▼ REQUIRED: fill these in before deploying ▼▼▼
const GOOGLE_CLIENT_ID = "494765023704-ts4f0c3845oskpr0vpg1iu682adrbjva.apps.googleusercontent.com"; // Google Cloud Console → Credentials → OAuth client ID (type: Web application)
const SPREADSHEET_ID   = "1eYfFCCz3OhwVcXhaQAXbHf7SsYs3Jef2FgDhVLxPLWc";           // From the sheet's URL: /d/{SPREADSHEET_ID}/edit
// ▲▲▲ ──────────────────────────────────────────── ▲▲▲
const ITEMS_SHEET      = "Items";      // tab name for the parent-product rows
const SUBITEMS_SHEET   = "Subitems";   // tab name for the per-test rows
const SHEET_EDIT_URL   = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/edit`;
const SCOPES           = "https://www.googleapis.com/auth/spreadsheets.readonly";
const LS_CACHE         = "rhino_compliance_gsheets_v1";
const LS_SYNCED        = "rhino_compliance_gsheets_synced_v1";
const DUE_SOON_DAYS    = 180; // 6 months

// ── STATE ───────────────────────────────────────────────────────────────────
let GROUPS = [];
let searchQ = "", openDD = null, modal = null;
let fCountry = "ALL", fResult = "ALL", fPriority = "ALL", fDateFrom = "", fDateTo = "", fSku = "", fGroup = "ALL", sortS = null;
let activeTab = "table";
let isSyncing = false, lastSynced = "Never", syncStatus = "ready";
let syncProgress = 0, syncMsg = "";
const gExp = {}, iExp = {};
// Monitoring tab filters
let monSearchQ = "", monFilterStatus = "ALL", monFilterDecision = "ALL", monFocusParent = "", monFilterPriority = "ALL";
// Expense tab filters
let expFilterPriority = "ALL", expFilterCategory = "ALL", expFilterYear = "ALL";

// Retest decisions: keyed by itemId+subId → {decision:"now"|"next"|"", note:""}
const LS_RETEST = "rhino_retest_decisions_v1";
let retestDecisions = {};
try{ retestDecisions = JSON.parse(localStorage.getItem(LS_RETEST)||"{}"); }catch(e){}

function saveRetestDecision(key, decision){
  retestDecisions[key] = decision;
  localStorage.setItem(LS_RETEST, JSON.stringify(retestDecisions));
}
function getRetestDecision(itemId, subId){
  return retestDecisions[itemId+"_"+subId]||"";
}

// ── GOOGLE OAUTH (Google Identity Services) ──────────────────────────────────
let accessToken = null;
let tokenClient = null;

function initGis(){
  if(tokenClient) return;
  if(!window.google || !google.accounts || !google.accounts.oauth2){
    setTimeout(initGis, 300); // gsi/client script still loading
    return;
  }
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: SCOPES,
    callback: (resp)=>{
      if(resp.error){
        isSyncing=false;
        setSyncUI("error","Google sign-in failed", resp.error==="access_denied"?"Access was denied.":String(resp.error),0);
        return;
      }
      accessToken = resp.access_token;
      fetchSheetData();
    },
  });
}
initGis();

// Instead of trying to silently refresh in the background (unreliable — depends on
// each browser/extension allowing a hidden Google session check, which many block),
// we simply prompt the person with a real button to click. A genuine click always
// works, since it's a normal user-initiated popup, not a background request.
let lastSyncPromptAt = 0;
const SYNC_PROMPT_COOLDOWN_MS = 4*60*1000; // don't ask again within 4 minutes of the last prompt

function promptSync(){
  if(!GROUPS.length || isSyncing || modal) return; // nothing cached yet, already syncing, or another dialog is open
  const now=Date.now();
  if(now-lastSyncPromptAt < SYNC_PROMPT_COOLDOWN_MS) return;
  lastSyncPromptAt=now;
  openModal({type:"syncPrompt"});
}

// Ask once shortly after opening the page (if there's cached data to potentially refresh),
// again if the person switches back to this tab after being away, and periodically while
// the tab stays open — all of these just show the same one-click prompt, never a silent attempt.
setInterval(()=>{ promptSync(); }, SYNC_PROMPT_COOLDOWN_MS);
document.addEventListener("visibilitychange", ()=>{
  if(document.visibilityState==="visible") promptSync();
});

// ── SYNC ─────────────────────────────────────────────────────────────────────
let syncAttemptCounter=0;
function triggerSync(){
  if(isSyncing) return;
  if(!GOOGLE_CLIENT_ID || GOOGLE_CLIENT_ID.indexOf("YOUR_")===0){
    setSyncUI("error","Setup required","Add your Google OAuth Client ID (GOOGLE_CLIENT_ID) in the code before syncing.",0);
    return;
  }
  isSyncing=true; setSyncUI("loading","Connecting to Google…","",15);
  if(!tokenClient) initGis();
  if(!tokenClient){
    isSyncing=false;
    setSyncUI("error","Not ready","Google sign-in library hasn't loaded yet. Check your connection and try again.",0);
    return;
  }
  // Safety net: if the popup gets silently blocked by the browser and never opens,
  // Google's callback may never fire at all — without this, the button would look
  // dead (isSyncing stuck true) on every future click.
  const syncAttemptId=++syncAttemptCounter;
  setTimeout(()=>{
    if(isSyncing && syncAttemptId===syncAttemptCounter){
      isSyncing=false;
      setSyncUI("error","Sign-in window didn't open","Your browser may have blocked the popup. Allow popups for this site and try again.",0);
    }
  }, 12000);
  tokenClient.requestAccessToken({prompt: accessToken ? "" : "consent"});
}

async function fetchSheetData(){
  try{
    setSyncUI("loading","Fetching data from Google Sheets…","",45);
    const url=`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values:batchGet?ranges=${encodeURIComponent(ITEMS_SHEET)}&ranges=${encodeURIComponent(SUBITEMS_SHEET)}&valueRenderOption=FORMATTED_VALUE`;
    const res=await fetch(url,{headers:{Authorization:"Bearer "+accessToken}});
    if(res.status===401){
      accessToken=null;
      throw new Error("Session expired. Click Sync again to reconnect.");
    }
    if(!res.ok){
      const errBody=await res.text();
      throw new Error(`Sheets API ${res.status}: ${errBody.slice(0,200)}`);
    }
    const data=await res.json();
    const itemsRange=data.valueRanges?.[0]?.values||[];
    const subsRange=data.valueRanges?.[1]?.values||[];
    if(!itemsRange.length) throw new Error(`No data found in the "${ITEMS_SHEET}" tab. Check the tab name matches ITEMS_SHEET in the code.`);

    setSyncUI("loading","Building dashboard…","",80);
    const itemRows=rowsToObjects(itemsRange);
    const subRows=rowsToObjects(subsRange);
    GROUPS=buildGroups(itemRows,subRows);
    if(!GROUPS.length) throw new Error("Sheet returned 0 items.");

    localStorage.setItem(LS_CACHE,JSON.stringify(GROUPS));
    const ts=new Date().toISOString();
    localStorage.setItem(LS_SYNCED,ts);
    lastSynced=fmtDate(ts);
    GROUPS.forEach(g=>{gExp[g.id]=true;g.items.forEach(i=>{iExp[i.id]=false;});});

    isSyncing=false; syncStatus="done";
    const ti=GROUPS.reduce((a,g)=>a+g.items.length,0);
    const ts2=GROUPS.reduce((a,g)=>a+g.items.reduce((b,i)=>b+i.subs.length,0),0);
    setSyncUI("done","Compliance Dashboard synced",`Last synced: ${lastSynced} · ${ti} products · ${ts2} test types`,100);
    const acctBtn=document.getElementById("hdr-acctBtn");
    if(acctBtn) acctBtn.style.display="inline-flex";
    renderAll();
  }catch(e){
    isSyncing=false;
    console.error(e);
    setSyncUI("error","Sync failed",String(e.message||e).slice(0,220),0);
  }
}

// ── SHEET ROW HELPERS ─────────────────────────────────────────────────────────
// Turns [[header,header,...], [row,row,...], ...] into [{header:val,...}, ...]
function rowsToObjects(rows){
  if(!rows||!rows.length) return [];
  const headers=rows[0].map(h=>String(h||"").trim());
  const out=[];
  for(let r=1;r<rows.length;r++){
    const row=rows[r];
    if(!row||!row.length) continue;
    const obj={}; let hasAny=false;
    headers.forEach((h,i)=>{
      if(!h) return;
      const v=row[i]!==undefined?String(row[i]):"";
      obj[h]=v;
      if(v) hasAny=true;
    });
    if(hasAny) out.push(obj);
  }
  return out;
}

// ── BUILD DATA MODEL ─────────────────────────────────────────────────────────
function buildGroups(itemRows, subRows){
  // index subitems by parent item id
  const subMap={};
  subRows.forEach((row,idx)=>{
    const pid=(row.parent_item_id||"").trim(); if(!pid) return;
    if(!subMap[pid]) subMap[pid]=[];
    const raw24=(row.y2024||"").trim(), raw25=(row.y2025||"").trim(), raw26=(row.y2026||"").trim();
    const name=row.name||"";
    const isTensile=/tensile|MBS|break strength/i.test(name);
    // Tensile tests are required annually (12 months)
    const freq = isTensile ? {months:12, label:"Annual (12 months)"} : parseFreq(row.labs||"");
    const sid=(row.s||"").trim()||(pid+"_"+idx);
    subMap[pid].push({
      id:"s"+sid, rowId:sid, name,
      std:row.std||"", criteria:row.criteria||"",
      target:row.target||"", equipment:row.equipment||"",
      accreditation:row.accreditation||"", labs:row.labs||"",
      p24:parsePBlocks(raw24), p25:parsePBlocks(raw25), p26:parsePBlocks(raw26),
      isTensile, freq,
    });
  });

  const grpMap={};
  itemRows.forEach(row=>{
    const gtitle=(row.group||"Uncategorized").trim()||"Uncategorized";
    const gid="g_"+gtitle.replace(/[^a-z0-9]+/gi,"_").toLowerCase();
    if(!grpMap[gid]) grpMap[gid]={id:gid,title:gtitle,color:groupColor(gtitle),items:[]};

    const rid=(row.id||"").trim();
    const websiteUrl=extractWebsiteUrl(row.website||"","","");

    grpMap[gid].items.push({
      id:"i"+rid, rowId:rid, name:row.name||"",
      url:SHEET_EDIT_URL,
      parentSku:row.parentSku||"",
      description:row.description||"",
      prioritySku:row.prioritySku||"",
      websiteUrl,
      meetsClaim:row.meetsClaim||"",
      mechTesting:row.mechTesting||"",
      chemTesting:row.chemTesting||"",
      corrTesting:row.corrTesting||"",
      country:row.country||"",
      colors:row.colors||"",
      channel:row.channel||"",
      subs:subMap[rid]||[],
    });
  });

  applyReplication(Object.values(grpMap));
  return Object.values(grpMap).filter(g=>g.items.length>0);
}

function extractWebsiteUrl(text, rawValue, directUrl){
  // 1. Best source: LinkValue inline fragment url field — clean, no escaping needed
  if(directUrl) return directUrl.replace(/&amp;/g,"&");
  // 2. JSON value field: {"url":"...","text":"..."}
  if(rawValue){try{const v=JSON.parse(rawValue);if(v?.url) return v.url.replace(/&amp;/g,"&");}catch(e){}}
  // 3. Text format "Label text - https://url" — split on FIRST " - http"
  if(text){
    const i=text.indexOf(' - http');
    if(i!==-1) return text.slice(i+3).trim().replace(/&amp;/g,"&");
    const m=text.match(/https?:\/\/\S+/);
    if(m) return m[0].replace(/&amp;/g,"&");
  }
  return "";
}

// ── PARENT SKU REPLICATION ────────────────────────────────────────────────────
function applyReplication(groups){
  const all=[];
  groups.forEach(g=>g.items.forEach(i=>all.push(i)));
  const byParent={};
  all.forEach(i=>{
    const key=i.parentSku||i.name;
    if(!byParent[key]) byParent[key]=[];
    byParent[key].push(i);
  });
  Object.values(byParent).forEach(siblings=>{
    if(siblings.length<2) return;
    const donor=siblings.reduce((best,cur)=>{
      const cs=cur.subs.filter(s=>s.p24.length||s.p25.length||s.p26.length).length;
      const bs=best.subs.filter(s=>s.p24.length||s.p25.length||s.p26.length).length;
      return cs>bs?cur:best;
    },siblings[0]);
    if(!donor.subs.length) return;
    siblings.forEach(item=>{
      if(item.id===donor.id) return;
      const hasData=item.subs.some(s=>s.p24.length||s.p25.length||s.p26.length);
      if(!hasData){
        item.subs=donor.subs.map(s=>({...s,_replicated:true,_replicatedFrom:donor.name}));
        // replicate compliance fields
        if(!item.meetsClaim)  item.meetsClaim=donor.meetsClaim;
        if(!item.mechTesting) item.mechTesting=donor.mechTesting;
        if(!item.chemTesting) item.chemTesting=donor.chemTesting;
        if(!item.corrTesting) item.corrTesting=donor.corrTesting;
        // replicate website
        if(!item.websiteUrl)  item.websiteUrl=donor.websiteUrl;
        // replicate prioritySku if blank
        if(!item.prioritySku) item.prioritySku=donor.prioritySku;
        item._replicatedFrom=donor.name;
      }
    });
  });
}

// ── PRIORITY BLOCK PARSER ────────────────────────────────────────────────────
function parsePBlocks(raw){
  if(!raw||/^no\s*test$/i.test(raw.trim())||!raw.trim()) return [];
  const parts=raw.split(/(?=(?:Priority Supplier|Supplier Priority)\s*\d+\s*:)/i);
  const blocks=[];
  parts.forEach(part=>{
    part=part.trim(); if(!part) return;
    const lines=part.split("\n").map(l=>l.trim()).filter(Boolean);
    const hm=lines[0].match(/^(?:Priority Supplier|Supplier Priority)\s*(\d+)\s*:\s*(.*)$/i);
    const priority=hm?parseInt(hm[1]):(blocks.length+1);
    const supplierName=hm?hm[2].trim():"";
    const get=k=>{const l=lines.find(x=>x.toLowerCase().startsWith(k.toLowerCase()));return l?l.replace(/^[^:]+:\s*/,"").trim():"";};
    const getM=k=>{
      const idx=lines.findIndex(x=>x.toLowerCase().startsWith(k.toLowerCase()));
      if(idx===-1) return "";
      let val=lines[idx].replace(/^[^:]+:\s*/,"").trim();
      for(let i=idx+1;i<lines.length;i++){if(/^[A-Za-z][^:]{0,50}:/.test(lines[i])) break;val+=" "+lines[i];}
      return val.trim();
    };
    // Extract ALL report-type lines — any line with a URL that has "report" in the key name
    // Covers: Test Report, SAE Report, SAEJ684 Report, Initial Test Report, Final Test Report, etc.
    const reports=[];
    lines.forEach(line=>{
      const m=line.match(/^([^:]{0,60}report[^:]{0,30})\s*:\s*(https?:\/\/\S+)/i);
      if(m) reports.push({label:m[1].trim(), url:m[2].trim().replace(/&amp;/g,"&")});
    });
    // Fallback: if no labeled report lines found, grab first non-evidence URL
    const evidenceVal=getM("Evidence");
    const evidenceUrl=(evidenceVal.match(/https?:\/\/[^\s\n"')]+/)?.[0]||"").replace(/&amp;/g,"&");
    if(!reports.length){
      const allUrls=[...part.matchAll(/https?:\/\/[^\s\n"')]+/g)].map(m=>m[0].replace(/&amp;/g,"&"));
      const fallbackUrl=allUrls.find(u=>u!==evidenceUrl)||null;
      if(fallbackUrl) reports.push({label:"Report",url:fallbackUrl});
    }

    blocks.push({
      priority,
      supplier:supplierName||get("Supplier"),
      method:get("Test Method")||get("Tensile Test Method")||get("Method"),
      wwl:get("Rhino Test WWL")||get("WWL"),
      claim:get("Rhino Break Strength Test Claim")||get("Break Claim"),
      result:get("Test Result")||get("Result"),
      date:get("Test Completion Date")||get("Test Completion")||get("Date"),
      lab:get("Test Lab")||get("Lab"),
      cost:get("Cost"),
      reports,
      report:reports[0]?.url||null,
      cap:getM("Supplier CAP")||getM("CAP"),
      evidence:evidenceVal,
      remarks:getM("Remarks"),
    });
  });
  if(!blocks.length){
    // single block, no priority header
    const lines=raw.split("\n").map(l=>l.trim()).filter(Boolean);
    const get=k=>{const l=lines.find(x=>x.toLowerCase().startsWith(k.toLowerCase()));return l?l.replace(/^[^:]+:\s*/,"").trim():"";};
    const getM=k=>{const idx=lines.findIndex(x=>x.toLowerCase().startsWith(k.toLowerCase()));if(idx===-1)return "";let val=lines[idx].replace(/^[^:]+:\s*/,"").trim();for(let i=idx+1;i<lines.length;i++){if(/^[A-Za-z][^:]{0,50}:/.test(lines[i]))break;val+=" "+lines[i];}return val.trim();};
    const rl=lines.find(x=>/^test result/i.test(x));
    const evidenceVal=getM("Evidence");
    const evidenceUrl=evidenceVal.match(/https?:\/\/[^\s\n"')]+/)?.[0]||"";
    const reports=[];
    lines.forEach(line=>{
      const m=line.match(/^([^:]{0,60}report[^:]{0,30})\s*:\s*(https?:\/\/\S+)/i);
      if(m) reports.push({label:m[1].trim(),url:m[2].trim().replace(/&amp;/g,"&")});
    });
    if(!reports.length){
      const rm=raw.match(/https?:\/\/[^\s\n"')]+/);
      if(rm&&rm[0]!==evidenceUrl) reports.push({label:"Report",url:rm[0].replace(/&amp;/g,"&")});
    }
    blocks.push({priority:1,supplier:get("Supplier"),method:get("Test Method")||get("Tensile Test Method"),wwl:get("Rhino Test WWL"),claim:get("Rhino Break Strength Test Claim"),result:rl?rl.replace(/^[^:]+:\s*/,"").trim():get("Result"),date:get("Test Completion Date")||get("Test Completion")||get("Date"),lab:get("Test Lab"),cost:get("Cost"),reports,report:reports[0]?.url||null,cap:getM("Supplier CAP")||getM("CAP"),evidence:evidenceVal,remarks:getM("Remarks")});
  }
  return blocks;
}

function calcOverall(blocks){
  if(!blocks||!blocks.length) return "notest";
  const p1=blocks.find(b=>b.priority===1);
  if(p1&&p1.result){
    if(/\bFAIL\b/i.test(p1.result)) return "FAIL";
    if(/\bPASS\b/i.test(p1.result)) return "PASS";
  }
  const anyFail=blocks.some(b=>/\bFAIL\b/i.test(b.result||""));
  const anyPass=blocks.some(b=>/\bPASS\b/i.test(b.result||""));
  if(anyFail&&!anyPass) return "FAIL";
  if(anyPass) return "PASS";
  return blocks[0]?.result?"data":"notest";
}
function bestResult(sub){
  for(const k of ["p26","p25","p24"]){if(sub[k]&&sub[k].length) return calcOverall(sub[k]);}
  return "notest";
}

// ── MONITORING HELPERS ────────────────────────────────────────────────────────
function parseFreq(labsText){
  // Look for frequency hints like "12 months", "annual", "6 months" in the labs field
  const t=(labsText||"").toLowerCase();
  const m=t.match(/(\d+)\s*month/i);
  if(m) return {months:parseInt(m[1]),label:m[0]};
  if(t.includes("annual")||t.includes("yearly")) return {months:12,label:"Annual (12 months)"};
  if(t.includes("semi-annual")||t.includes("biannual")) return {months:6,label:"Semi-annual (6 months)"};
  if(t.includes("quarterly")) return {months:3,label:"Quarterly (3 months)"};
  return null;
}
function latestTestDate(sub){
  let best=null;
  for(const k of ["p26","p25","p24"]){
    (sub[k]||[]).forEach(b=>{
      const d=parseDate(b.date);
      if(d&&(!best||d>best)) best=d;
    });
  }
  return best;
}
function parseDate(s){
  if(!s) return null;
  // MM/DD/YYYY
  const p=s.split("/"); if(p.length===3){const d=new Date(p[2],p[0]-1,p[1]);if(!isNaN(d)) return d;}
  const d=new Date(s); return isNaN(d)?null:d;
}
function calcExpiry(sub, itemId){
  const last=latestTestDate(sub); if(!last) return null;
  const decision = itemId ? getRetestDecision(itemId, sub.id) : "";
  // Rule: 2024 test → +2 years. 2025 onward → +1 year.
  const lastYear=last.getFullYear();
  const addYears = lastYear <= 2024 ? 2 : 1;
  const standardDue=new Date(last);
  standardDue.setFullYear(standardDue.getFullYear()+addYears);
  if(decision==="next"){
    // Defer: standard due + 12 months
    const deferred=new Date(standardDue);
    deferred.setMonth(deferred.getMonth()+12);
    return deferred;
  }
  return standardDue;
}
function monStatus(sub, itemId){
  const exp=calcExpiry(sub, itemId); if(!exp) return "none";
  const decision = itemId ? getRetestDecision(itemId, sub.id) : "";
  if(decision==="next") return "deferred";
  const days=Math.round((exp-new Date())/(86400000));
  if(days<0)   return "overdue";    // 🔴 past due date
  if(days<=180) return "due_soon";  // 🟡 within 6 months
  return "ok";                       // 🟢 more than 6 months away
}
function fmtD(d){return d?d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}):"—";}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function groupColor(t){
  const tl=(t||"").toLowerCase();
  if(tl.includes("tie")||tl.includes("strap")||tl.includes("ratchet")) return "#a358df";
  if(tl.includes("recovery")||tl.includes("gear")||tl.includes("rope")) return "#00c875";
  if(tl.includes("walmart")) return "#0073ea";
  if(tl.includes("bungee")||tl.includes("eu")||tl.includes("uk")) return "#fdab3d";
  const p=["#a358df","#00c875","#0073ea","#fdab3d","#e2445c","#037f4c","#ff642e"];
  let h=0;for(const c of (t||"")) h=(h*31+c.charCodeAt(0))&0xffff;
  return p[h%p.length];
}
function fmtDate(iso){return new Date(iso).toLocaleString("en-US",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"});}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

// ── RENDER HELPERS ────────────────────────────────────────────────────────────
function rb(r){
  if(!r||r==="notest") return '<span style="color:#bbb;font-size:10px">—</span>';
  const m={PASS:{bg:"#e3f9ee",c:"#0a7a46"},FAIL:{bg:"#ffe8e8",c:"#c0392b"},data:{bg:"#e8f2ff",c:"#0055bb"}};
  const s=m[r]||m.data;
  return `<span class="badge" style="background:${s.bg};color:${s.c}">${r==="data"?"Data":r}</span>`;
}
function cb(c){
  const m={"US":{bg:"#e8f2ff",c:"#0055bb"},"EU":{bg:"#fff3e0",c:"#a05000"},"US/CA":{bg:"#e8f2ff",c:"#0055bb"}};
  const s=m[c]||{bg:"#f0efef",c:"#555"};
  return `<span class="badge" style="background:${s.bg};color:${s.c}">${esc(c)||"—"}</span>`;
}
function yb(val){
  if(!val||val==="—"||val==="") return `<span class="cs-pill cs-no">—</span>`;
  if(/^yes/i.test(val)) return `<span class="cs-pill cs-yes">✓ ${esc(val)}</span>`;
  if(/^no$/i.test(val)) return `<span class="cs-pill cs-no">✗ No</span>`;
  return `<span class="cs-pill cs-yes">${esc(val)}</span>`;
}
// Clipped version for table cells — truncates long text with ellipsis
function ybClip(val){
  if(!val||val==="—"||val==="") return `<span class="cs-pill cs-no">—</span>`;
  const isYes=/^yes/i.test(val);
  const isNo=/^no$/i.test(val);
  const cls=isNo?"cs-no":"cs-yes";
  const prefix=isYes?"✓ ":isNo?"✗ ":"";
  const text=isNo?"No":val;
  return `<span class="cs-pill ${cls}" style="max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-flex" title="${esc(text)}">${prefix}${esc(text)}</span>`;
}
function pBadge(p){return `<span class="p${Math.min(p,4)}b">P${p}</span>`;}

function ycell(blocks){
  if(!blocks||!blocks.length) return '<span style="color:#ddd;font-size:10px">—</span>';
  const overall=calcOverall(blocks);
  const ip=/^PASS$/i.test(overall), ifl=/^FAIL$/i.test(overall);
  const oc=ifl?"#c0392b":ip?"#0a7a46":"#555";
  let h=`<div style="font-size:10px;line-height:1.5;color:#222">`;

    h+=`<div style="display:inline-flex;align-items:center;gap:4px;background:${ip?"#e3f9ee":ifl?"#ffe8e8":"#f7f8fa"};border:1px solid ${ip?"#c3f0da":ifl?"#ffd5d5":"#e0e0e0"};border-radius:4px;padding:2px 7px;margin-bottom:5px;font-size:9px;font-weight:700;color:${oc}">Overall (P1 Rule): ${overall}</div>`;
  }
  blocks.forEach((b,idx)=>{
    const bp=/\bPASS\b/i.test(b.result||""), bf=/\bFAIL\b/i.test(b.result||"");
    const bc=bf?"#c0392b":bp?"#0a7a46":"#555";
    if(idx>0) h+=`<div style="margin-top:5px;padding-top:5px;border-top:0.5px dashed #e0e0e0">`;
    h+=`<div style="display:flex;align-items:flex-start;gap:4px;margin-bottom:2px">${pBadge(b.priority)}`;
    if(b.supplier) h+=`<span style="font-weight:600;font-size:10px">${esc(b.supplier)}</span>`;
    h+=`</div>`;
    if(b.result) h+=`<div style="color:${bc};font-weight:700;margin-bottom:2px;font-size:10px">${esc(b.result)}</div>`;
    if(b.wwl) h+=`<div style="color:#666;font-size:9px">WWL: ${esc(b.wwl)}${b.claim?" | Claim: "+esc(b.claim):""}</div>`;
    if(b.date||b.lab) h+=`<div style="color:#888;font-size:9px">${[b.date,b.lab].filter(Boolean).join(" · ")}</div>`;
    // Render all report links as labeled buttons
    const reportList=b.reports&&b.reports.length?b.reports:(b.report?[{label:"Report",url:b.report}]:[]);
    reportList.forEach(r=>{
      // Use onclick window.open as fallback for environments where href clicks are blocked
      const cleanUrl=r.url.replace(/&amp;/g,"&");
      h+=`<a href="${cleanUrl}" target="_blank" rel="noopener noreferrer" class="rpt" onclick="event.stopPropagation()" title="${esc(r.label)}">📄 ${esc(r.label)} ↗</a>`;
    });
    if(b.cap) h+=`<div style="margin-top:3px;padding:3px 6px;background:#fff8e0;border-left:2px solid #fdab3d;border-radius:0 3px 3px 0;font-size:9px"><span style="font-weight:700;color:#b07000">CAP:</span> ${esc(b.cap)}</div>`;
    if(b.evidence){
      const evUrl=(b.evidence.match(/https?:\/\/[^\s\n"')]+/)?.[0]||"").replace(/&amp;/g,"&");
      const evText=b.evidence.replace(/https?:\/\/[^\s\n"')]+/g,"").trim();
      h+=`<div style="margin-top:3px;padding:3px 6px;background:#f0f9ff;border-left:2px solid #0073ea;border-radius:0 3px 3px 0;font-size:9px">
        <span style="font-weight:700;color:#0055bb">Evidence:</span>
        ${evText?` ${esc(evText)}`:""}
        ${evUrl?`<a href="${evUrl}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation();window.open('${evUrl.replace(/'/g,"\\'")}','_blank')" style="display:inline-flex;align-items:center;gap:2px;color:#0073ea;font-weight:600;text-decoration:none;margin-left:3px">🔗 View ↗</a>`:""}
      </div>`;
    }
    if(b.remarks) h+=`<div style="margin-top:3px;padding:3px 6px;background:#f7f0ff;border-left:2px solid #7c3aed;border-radius:0 3px 3px 0;font-size:9px"><span style="font-weight:700;color:#5b21b6">Remarks:</span> ${esc(b.remarks)}</div>`;
    if(idx>0) h+=`</div>`;
  });
  return h+"</div>";
}

// ── FILTER / SORT ─────────────────────────────────────────────────────────────
function matchF(item){
  if(fCountry!=="ALL"&&item.country!==fCountry) return false;
  if(fResult!=="ALL"&&!item.subs.some(s=>bestResult(s)===fResult)) return false;
  if(fPriority!=="ALL"&&item.prioritySku!==fPriority) return false;
  if(fSku&&item.id!=="i"+fSku&&item.name!==fSku) return false;
  if(fGroup!=="ALL"){
    // find which group this item belongs to
    let itemGroup="";
    GROUPS.forEach(g=>g.items.forEach(i=>{if(i.id===item.id) itemGroup=g.title;}));
    if(itemGroup!==fGroup) return false;
  }
  if(fDateFrom||fDateTo){
    const from=fDateFrom?new Date(fDateFrom):null;
    const to=fDateTo?new Date(fDateTo):null;
    // match if any test date in any year block falls within range
    const hasMatch=item.subs.some(sub=>{
      const dates=[];
      [sub.p24,sub.p25,sub.p26].forEach(blocks=>(blocks||[]).forEach(b=>{
        const d=parseDate(b.date); if(d) dates.push(d);
      }));
      return dates.some(d=>(!from||d>=from)&&(!to||d<=to));
    });
    if(!hasMatch) return false;
  }
  if(searchQ){
    const q=searchQ.toLowerCase();
    // Build a comprehensive haystack — name, description, parentSku, all skus, subs
    const haystack=[
      item.name,
      item.description,
      item.parentSku,
      item.prioritySku,
      item.country,
      item.channel,
      item.colors,
      item.mechTesting,
      item.chemTesting,
      item.corrTesting,
      item.meetsClaim,
      // Also search each word segment of the name (e.g. "HDKIT" matches "HDKIT-4PK-GRN")
      ...item.name.split(/[-_\s]/),
      ...item.subs.map(s=>s.name+" "+s.std+" "+s.criteria)
    ].join(" ").toLowerCase();
    if(!haystack.includes(q)) return false;
  }
  return true;
}
function getVis(){
  let all=[];
  GROUPS.forEach(g=>g.items.forEach(i=>all.push({...i,_gid:g.id,_gtitle:g.title,_gc:g.color})));
  all=all.filter(matchF);
  if(sortS) all.sort((a,b)=>{
    const av=(a[sortS.col]||"").toLowerCase(),bv=(b[sortS.col]||"").toLowerCase();
    return sortS.dir==="asc"?av.localeCompare(bv):bv.localeCompare(av);
  });
  return all;
}
function groupVis(items){
  const m={};
  items.forEach(i=>{if(!m[i._gid])m[i._gid]={id:i._gid,title:i._gtitle,color:i._gc,items:[]};m[i._gid].items.push(i);});
  return Object.values(m);
}

// ── KPI ───────────────────────────────────────────────────────────────────────
function calcKPIs(){
  let pass=0,fail=0,notest=0,overdue=0,dueSoon=0;

  // Per-priority completion: count at ITEM level
  // Priority SKU values: A, B, C, Retail (exact values from monday board)
  const priGroups={A:{done:0,total:0},B:{done:0,total:0},C:{done:0,total:0},Retail:{done:0,total:0}};

  GROUPS.forEach(g=>g.items.forEach(item=>{
    const pri=(item.prioritySku||"").trim(); // exact value from board: A, B, C, Retail
    // Simple rule: item has ANY subtest with data = 1 tested SKU
    // Replicated items also count — they share verified test data
    const hasDone = item.subs.length > 0 && item.subs.some(s=>
      (s.p24&&s.p24.length>0)||(s.p25&&s.p25.length>0)||(s.p26&&s.p26.length>0)
    );

    // Match case-insensitively against known tiers
    const priKey=Object.keys(priGroups).find(k=>k.toLowerCase()===pri.toLowerCase());
    if(priKey){
      priGroups[priKey].total++;
      if(hasDone) priGroups[priKey].done++;
    }

    item.subs.forEach(sub=>{
      const r=bestResult(sub);
      if(r==="PASS") pass++; else if(r==="FAIL") fail++; else notest++;
      if((sub.p24&&sub.p24.length>0)||(sub.p25&&sub.p25.length>0)||(sub.p26&&sub.p26.length>0)){
        const ms=monStatus(sub,item.id);
        if(ms==="overdue") overdue++;
        else if(ms==="due_soon") dueSoon++;
      }
    });
  }));

  // Completion rate per group
  const priRate=(g)=>g.total>0?Math.round(g.done/g.total*100):null;

  const completed=pass+fail,total=completed+notest;
  const rate=completed>0?Math.round(pass/completed*100):null;
  return{pass,fail,notest,completed,total,rate,overdue,dueSoon,priGroups,priRate};
}

  const bar=document.getElementById("banner-bar");
  if(progress>0&&status==="loading"){prog.style.display="block";bar.style.width=progress+"%";}
  else{prog.style.display="none";}
  const btnStates={
    ready:{cls:"idle",txt:"🔗 Connect &amp; Sync",disabled:false},
    loading:{cls:"loading",txt:"Syncing…",disabled:true},
    done:{cls:"done",txt:"✓ Re-sync",disabled:false},
    stale:{cls:"done",txt:"✓ Re-sync",disabled:false},

              <div style="display:inline-flex;align-items:center;gap:3px;background:${cfg.bg};border:1px solid ${cfg.border};border-radius:4px;padding:2px 6px;font-weight:700;color:${cfg.color};margin-bottom:2px">${cfg.icon} ${cfg.label}</div>

              <button onclick="event.stopPropagation();viewInMonitoring('${item.parentSku||item.rowId}')" style="font-size:8px;color:#0073ea;background:none;border:none;cursor:pointer;padding:0;text-decoration:underline;display:block">View in Monitoring →</button>
            </div>`;

          ["Mechanical Testing", item.mechTesting],

        html+=`<div class="ir" style="display:grid;grid-template-columns:${mg};border-bottom:0.5px solid #e8eaed;background:#fff;align-items:start">

            <div style="width:4px;min-height:18px;border-radius:2px;background:${grp.color};flex-shrink:0;margin-top:2px"></div>
            <div style="overflow:hidden;flex:1;min-width:0">
              <div style="font-size:12px;font-weight:600;color:#222;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(item.name)}</div>
              ${item.description?`<div style="font-size:10px;color:#666;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px">${esc(item.description)}</div>`:""}
              ${item.parentSku?`<div style="font-size:9px;color:#aaa;margin-top:1px">Parent: ${esc(item.parentSku)}</div>`:""}
            </div>
          </div>
          <!-- Priority — right of Product/SKU -->
          <div style="padding:9px 6px;border-right:0.5px solid #e8eaed;display:flex;align-items:flex-start;justify-content:center;padding-top:10px">
            ${item.prioritySku?`<span style="background:#e8f2ff;color:#0055bb;border:1px solid #c0d8f8;border-radius:6px;font-size:11px;font-weight:700;padding:2px 6px">${esc(item.prioritySku)}</span>`:`<span style="color:#ddd;font-size:10px">—</span>`}
          </div>
          <!-- Annual Test -->
          <div style="padding:9px 8px;border-right:0.5px solid #e8eaed;overflow:hidden">${annualCell}</div>
          <!-- Compliance summary — compact clickable cell, opens popup -->
          <div class="comp-cell" onclick="event.stopPropagation();openComplianceModal('${item.id}')" style="padding:9px 10px;border-right:0.5px solid #e8eaed;min-width:0;cursor:pointer" title="Click to see full compliance details">
            <table style="border-collapse:collapse;width:100%;font-size:10px">
              ${[["Mechanical",item.mechTesting],["Chemical",item.chemTesting],["Corrosion",item.corrTesting],["Claim",item.meetsClaim]].map(([l,v])=>`
              <tr>
                <td style="padding:1px 5px 2px 0;color:#888;font-weight:500;white-space:nowrap;vertical-align:middle;width:1%">${l}</td>
                <td style="padding:1px 0 2px 0;vertical-align:middle;max-width:0;overflow:hidden">
                  ${v ? `<span class="${/^yes/i.test(v)?"cs-pill cs-yes":"cs-pill cs-no"}" style="display:inline-block;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:middle" title="${esc(v)}">${/^yes/i.test(v)?"✓ ":""}${esc(v)}</span>` : `<span style="color:#ccc;font-size:9px">—</span>`}
                </td>
              </tr>`).join("")}
            </table>
            <div style="margin-top:4px;font-size:9px;color:#0073ea;font-weight:500">🔍 Click for details${item.websiteUrl?" · 🔗 View Product":""}</div>
          </div>
          <!-- Country -->
          <div style="padding:9px 8px;border-right:0.5px solid #e8eaed;overflow:hidden">${cb(item.country)}</div>
          <!-- Channel -->
          <div style="padding:9px 8px;border-right:0.5px solid #e8eaed;font-size:10px;color:#444;overflow:hidden;word-break:break-word">${esc(item.channel||"—")}</div>
          <!-- Colors -->
          <div style="padding:9px 8px;font-size:10px;color:#444;overflow:hidden">${esc(item.colors||"—")}</div>
        </div>`;

        if(iOpen){
          // Only filter subtests if the search term specifically matches subtest content
          // If the item was matched by its own name/SKU, show ALL subtests unfiltered
          const itemMatchedDirectly = !searchQ || [item.name, item.description, item.parentSku, item.prioritySku, item.country, item.channel, ...item.name.split(/[-_\s]/)].some(v=>(v||"").toLowerCase().includes(searchQ.toLowerCase()));
          const fsubs = searchQ && !itemMatchedDirectly
            ? item.subs.filter(s=>(s.name+s.std).toLowerCase().includes(searchQ.toLowerCase()))
            : item.subs;
          html+=`<div style="background:#f6f7fb;border-bottom:0.5px solid #e0e0e0">
            <div style="display:grid;grid-template-columns:${sg};background:#eeeff5;border-bottom:0.5px solid #dde0e9">
              ${sHdrs.map((h,i)=>`<div style="padding:5px 10px 5px ${i===0?"44px":"10px"};font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;border-right:0.5px solid #dde0e9">${h}</div>`).join("")}
            </div>`;
          fsubs.forEach(sub=>{
            const br=bestResult(sub);
            html+=`<div class="sr" onclick="openDetail('${sub.id}','${item.id}','${grp.id}')" style="display:grid;grid-template-columns:${sg};border-bottom:0.5px solid #e8eaed;align-items:start">
              <div style="padding:7px 10px 7px 44px;border-right:0.5px solid #e8eaed;min-width:0">
